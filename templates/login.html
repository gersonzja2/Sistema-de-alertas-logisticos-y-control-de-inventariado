<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Sistema de Alertas Logísticas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --accent-hover: #60a5fa;
            --danger: #ef4444;
            --success: #10b981;
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(at 20% 50%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 80% 50%, rgba(239, 68, 68, 0.05) 0px, transparent 50%);
            -webkit-font-smoothing: antialiased;
        }
        .login-container { width:100%; max-width:440px; padding:20px; }
        .login-card {
            background-color: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 36px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .login-header { text-align:center; margin-bottom:24px; }
        .login-header .logo-icon { width:36px; height:36px; color:var(--accent-blue); filter:drop-shadow(0 0 12px var(--accent-blue-glow)); margin-bottom:12px; }
        .login-header h1 { font-size:1.4rem; font-weight:700; letter-spacing:-0.025em; margin-bottom:4px; }
        .login-header p { color:var(--text-secondary); font-size:0.85rem; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:0.85rem; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
        .input-wrapper { position:relative; display:flex; align-items:center; }
        .input-wrapper i { position:absolute; left:14px; width:18px; height:18px; color:var(--text-secondary); pointer-events:none; }
        .input-wrapper input {
            width:100%; padding:11px 14px 11px 42px; background-color:rgba(15,23,42,0.6);
            border:1px solid var(--border-color); border-radius:8px; color:white; font-size:0.9rem; font-family:var(--font-sans);
            transition:var(--transition);
        }
        .input-wrapper input:focus { outline:none; border-color:var(--accent-blue); box-shadow:0 0 0 3px var(--accent-blue-glow); }
        .btn-primary {
            width:100%; padding:11px 20px; border:none; border-radius:8px; font-size:0.9rem; font-weight:600;
            font-family:var(--font-sans); cursor:pointer; transition:var(--transition);
            display:flex; align-items:center; justify-content:center; gap:8px;
            background-color:var(--accent-blue); color:white;
        }
        .btn-primary:hover { background-color:var(--accent-hover); transform:translateY(-1px); box-shadow:0 4px 12px rgba(59,130,246,0.3); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        .error-msg { color:var(--danger); font-size:0.85rem; text-align:center; margin-top:12px; min-height:20px; }
        .login-footer { text-align:center; margin-top:20px; color:var(--text-secondary); font-size:0.75rem; }
        .role-info { display:none; text-align:center; padding:16px; margin-top:16px; border-radius:8px; border:1px solid var(--border-color); }
        .role-info.show { display:block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .role-badge-display { display:inline-block; padding:4px 16px; border-radius:999px; font-size:0.85rem; font-weight:600; margin-top:6px; }
        .role-badge-admin { background:rgba(239,68,68,0.15); color:#ef4444; }
        .role-badge-trabajador { background:rgba(59,130,246,0.15); color:#3b82f6; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i data-lucide="box" class="logo-icon"></i>
                <h1>Alertas Logísticas</h1>
                <p>Inicia sesión en el sistema de inventario</p>
            </div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" placeholder="Ingresa tu usuario" autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña">
                    </div>
                </div>
                <button type="submit" id="btn-login" class="btn-primary">
                    <i data-lucide="log-in"></i> <span>Iniciar Sesión</span>
                </button>
                <p id="login-error" class="error-msg"></p>
                <div id="role-info" class="role-info">
                    <i data-lucide="check-circle" style="width:24px;height:24px;color:var(--success);margin-bottom:6px;"></i>
                    <p style="font-weight:600;font-size:1rem;" id="ri-username"></p>
                    <div><span id="ri-role-badge" class="role-badge-display"></span></div>
                    <p id="ri-sucursal" style="color:var(--text-secondary);font-size:0.85rem;margin-top:4px;"></p>
                    <p style="color:var(--text-secondary);font-size:0.8rem;margin-top:8px;">Redirigiendo al sistema...</p>
                </div>
            </form>

            <div class="login-footer">
                <span>Sistema de Alertas Logísticas y Control de Inventario</span>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();

        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('login-error');

            if (!username || !password) {
                errorMsg.textContent = 'Todos los campos son requeridos.';
                return false;
            }
            btn.disabled = true;
            btn.querySelector('span').textContent = 'Ingresando...';
            errorMsg.textContent = '';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    const u = data.user;
                    document.getElementById('ri-username').textContent = `Conectado como ${u.username}`;
                    const rb = document.getElementById('ri-role-badge');
                    if (u.rol === 'admin') {
                        rb.textContent = 'Administrador';
                        rb.className = 'role-badge-display role-badge-admin';
                    } else {
                        rb.textContent = 'Trabajador';
                        rb.className = 'role-badge-display role-badge-trabajador';
                    }
                    document.getElementById('ri-sucursal').textContent = u.sucursal ? `Sucursal: ${u.sucursal.nombre}` : '';
                    document.getElementById('role-info').classList.add('show');
                    btn.style.display = 'none';
                    document.querySelectorAll('#login-form .form-group').forEach(g => g.style.display = 'none');
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                } else {
                    errorMsg.textContent = data.detail || 'Credenciales inválidas.';
                }
            } catch (e) {
                errorMsg.textContent = 'Error de conexión con el servidor.';
            } finally {
                if (btn.style.display !== 'none') {
                    btn.disabled = false;
                    btn.querySelector('span').textContent = 'Iniciar Sesión';
                }
            }
            return false;
        }
    </script>
</body>
</html>
